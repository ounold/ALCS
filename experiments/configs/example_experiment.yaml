experiment_name: Example_Experiment
repetitions: 10
environment:
  name: GridEnvironment
  params:
    rows: 7
    cols: 7
    start_pos: [0, 0]
    goal_pos: [0, 6]
    obstacles:
      - [1, 2]
      - [1, 4]
      - [1, 5]
      - [2, 1]
      - [3, 3]
      - [3, 4]
      - [4, 1]
      - [4, 3]
      - [4, 6]
      - [5, 1]
      - [5, 4]
      - [6, 5]

models:
  - model_name: ACS2_v1
    path: src.models.acs2.acs2.ACS2
    config_path: src.models.acs2.conf.ACS2Configuration
    params:
      beta: 0.05
      gamma: 0.95

  - model_name: ACS2_v2_high_beta
    path: src.models.acs2.acs2.ACS2
    config_path: src.models.acs2.conf.ACS2Configuration
    params:
      beta: 0.2
      gamma: 0.95